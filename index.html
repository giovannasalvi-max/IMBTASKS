<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMB 2026 — Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:#0D1B2A; --navy2:#122234; --navy3:#1a2f45;
      --red:#C8102E; --red2:#a50d26;
      --muted:#8a9bb0; --muted2:#6b7f96; --white:#ffffff;
      --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
      --card-bg:rgba(255,255,255,0.04); --card-hover:rgba(255,255,255,0.07);
      --font-display:'DM Serif Display',serif; --font-body:'DM Sans',sans-serif;
      --idea:#a78bfa; --todo:#8a9bb0; --doing:#4fa3e0; --done:#4caf7d;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--navy);color:var(--white);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(200,16,46,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}

    /* LOGIN */
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
    .login-box{width:360px;text-align:center}
    .login-logo{font-family:var(--font-display);font-size:13px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
    .login-title{font-family:var(--font-display);font-size:36px;color:var(--white);line-height:1.1;margin-bottom:6px}
    .login-title em{color:var(--red);font-style:italic}
    .login-sub{font-size:13px;color:var(--muted);margin-bottom:40px;font-weight:300}
    .login-field{margin-bottom:12px}
    .login-field input{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid var(--border2);border-radius:8px;padding:14px 18px;font-family:var(--font-body);font-size:14px;color:var(--white);outline:none;transition:border-color .2s;letter-spacing:.1em}
    .login-field input:focus{border-color:rgba(200,16,46,0.5)}
    .login-field input::placeholder{color:var(--muted);letter-spacing:0}
    .login-btn{width:100%;background:var(--red);border:none;border-radius:8px;padding:14px;font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--white);cursor:pointer;transition:background .2s,transform .1s}
    .login-btn:hover{background:var(--red2)}
    .login-btn:active{transform:scale(0.98)}
    .login-error{font-size:12px;color:#f0727f;margin-top:10px;display:none}

    /* APP */
    #app-screen{display:none;position:relative;z-index:1}
    .topbar{background:var(--navy2);border-bottom:0.5px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .topbar-brand{font-family:var(--font-display);font-size:16px;color:var(--white);display:flex;align-items:center;gap:10px}
    .topbar-brand span{color:var(--red);font-style:italic}
    .topbar-dot{width:6px;height:6px;border-radius:50%;background:var(--red);opacity:.7}
    .topbar-right{display:flex;align-items:center;gap:8px}
    .btn{font-family:var(--font-body);font-size:13px;font-weight:400;padding:7px 16px;border-radius:7px;border:0.5px solid var(--border2);background:transparent;color:var(--white);cursor:pointer;transition:background .15s;white-space:nowrap}
    .btn:hover{background:var(--card-hover)}
    .btn-red{background:var(--red);border-color:var(--red);font-weight:500}
    .btn-red:hover{background:var(--red2);border-color:var(--red2)}
    .btn-ghost{border-color:transparent;color:var(--muted);font-size:12px}
    .btn-ghost:hover{color:var(--white);background:transparent}
    .btn-delete{background:none;border:0.5px solid rgba(200,16,46,0.3);color:#f0727f}
    .btn-delete:hover{background:rgba(200,16,46,0.1)}

    /* LAYOUT */
    .app-body{display:flex;align-items:flex-start;min-height:calc(100vh - 56px)}

    /* CALENDAR SIDEBAR */
    .cal-sidebar{width:210px;flex-shrink:0;background:var(--navy2);border-left:0.5px solid var(--border);padding:16px 12px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;display:flex;flex-direction:column;gap:20px}
    .mini-cal{}
    .cal-header{display:flex;align-items:center;gap:6px;margin-bottom:10px}
    .cal-month{font-size:12px;font-weight:500;color:var(--white);letter-spacing:.05em;flex:1;text-align:center}
    .cal-nav{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 5px;font-size:14px;border-radius:4px;transition:color .15s}
    .cal-nav:hover{color:var(--white)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .cal-dow{font-size:9px;color:var(--muted2);text-align:center;padding:2px 0;font-weight:500}
    .cal-day{height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);cursor:default;position:relative;flex-direction:column}
    .cal-day.today{background:var(--red);color:var(--white);font-weight:500}
    .cal-day.has-task{color:var(--white)}
    .cal-day.other-month{opacity:.25}
    .cal-dot{width:3px;height:3px;border-radius:50%;background:var(--doing);position:absolute;bottom:2px}
    .cal-day.today .cal-dot{background:rgba(255,255,255,0.7)}
    .cal-upcoming-title{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .cal-upcoming-list{display:flex;flex-direction:column;gap:5px}
    .cal-task-chip{font-size:11px;padding:6px 8px;border-radius:7px;background:rgba(255,255,255,0.04);border:0.5px solid var(--border);color:var(--white);display:flex;align-items:center;gap:6px;cursor:pointer;transition:background .15s}
    .cal-task-chip:hover{background:var(--card-hover)}
    .cal-task-chip .chip-date{color:var(--muted2);font-size:10px;margin-left:auto;flex-shrink:0}
    .cal-task-chip .chip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .cal-task-chip .chip-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
    .no-upcoming{font-size:11px;color:var(--muted2)}

    /* MAIN CONTENT */
    .main-content{flex:1;min-width:0;display:flex;flex-direction:column}

    /* TABS */
    .tabs-bar{padding:12px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px}
    .tab{font-family:var(--font-body);font-size:13px;font-weight:400;padding:8px 18px;border:0.5px solid var(--border2);border-radius:8px;background:rgba(255,255,255,0.04);color:var(--muted);cursor:pointer;transition:color .15s,background .15s,border-color .15s}
    .tab:hover{color:var(--white);background:rgba(255,255,255,0.08);border-color:var(--border2)}
    .tab.active{color:var(--white);font-weight:500;background:var(--red);border-color:var(--red)}

    /* FILTERS */
    .filters-bar{padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:0.5px solid var(--border)}
    .filters-bar select{font-family:var(--font-body);font-size:13px;padding:7px 12px;border-radius:7px;border:0.5px solid var(--border2);background:var(--card-bg);color:var(--white);outline:none;cursor:pointer}
    .filters-bar select option{background:var(--navy2);color:var(--white)}
    .filter-sep{width:1px;height:20px;background:var(--border);margin:0 2px}
    .stats-pills{display:flex;gap:8px;margin-left:auto}
    .stat-pill{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border);color:var(--muted);display:flex;align-items:center;gap:5px}
    .stat-pill .dot{width:6px;height:6px;border-radius:50%}

    /* BOARD */
    .board-wrap{padding:20px;overflow-x:auto;flex:1}
    .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;min-width:700px}
    .col{background:var(--card-bg);border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
    .col-head{padding:13px 14px 11px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .col-head-left{display:flex;align-items:center;gap:8px}
    .col-indicator{width:8px;height:8px;border-radius:50%}
    .col-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .col-count{font-size:11px;color:var(--muted2);background:rgba(255,255,255,0.06);border-radius:10px;padding:2px 8px}
    .col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px}
    .empty-col{font-size:12px;color:var(--muted2);text-align:center;padding:24px 0;opacity:.6}

    /* CARDS */
    .card{background:rgba(255,255,255,0.05);border:0.5px solid var(--border);border-radius:9px;padding:11px 13px;cursor:pointer;transition:background .15s,border-color .2s,transform .15s;position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:9px 0 0 9px;opacity:0;transition:opacity .2s}
    .card:hover{background:var(--card-hover);border-color:var(--border2);transform:translateY(-1px)}
    .card:hover::before{opacity:1}
    .card.idea::before{background:var(--idea)}
    .card.todo::before{background:var(--todo)}
    .card.doing::before{background:var(--doing)}
    .card.done::before{background:var(--done)}
    .card-title{font-size:13px;font-weight:500;color:var(--white);line-height:1.4;margin-bottom:7px}
    .card.done .card-title{opacity:.55;text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.25)}
    .card-dates{display:flex;align-items:center;gap:6px;margin-bottom:7px}
    .card-date-item{font-size:11px;color:var(--muted2)}
    .card-date-item.overdue{color:#f0727f}
    .card-date-sep{font-size:10px;color:var(--border2)}
    .card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
    .badge{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap}
    .badge-area{background:rgba(200,16,46,0.15);color:#f0727f;border:0.5px solid rgba(200,16,46,0.25)}
    .badge-event{background:rgba(79,163,224,0.15);color:#4fa3e0;border:0.5px solid rgba(79,163,224,0.25)}
    .badge-action{background:rgba(76,175,125,0.15);color:#4caf7d;border:0.5px solid rgba(76,175,125,0.25)}
    .badge-person{background:rgba(255,255,255,0.07);color:var(--muted);border:0.5px solid var(--border)}
    .card-last-update{font-size:11px;color:var(--muted2);margin-top:7px;line-height:1.4;font-style:italic;border-top:0.5px solid var(--border);padding-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-links-preview{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap}
    .link-thumb{width:34px;height:34px;border-radius:6px;overflow:hidden;border:0.5px solid var(--border)}
    .link-thumb img{width:100%;height:100%;object-fit:cover}
    .link-pill{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,0.05);border:0.5px solid var(--border);color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:4px}
    .pdf-pill{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(200,16,46,0.12);border:0.5px solid rgba(200,16,46,0.3);color:#f0727f;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
    .pdf-pill:hover{background:rgba(200,16,46,0.22)}

    /* MODAL */
    .modal-bg{position:fixed;inset:0;background:rgba(5,12,20,0.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(4px)}
    .modal{background:var(--navy2);border:0.5px solid var(--border2);border-radius:14px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:24px}
    .modal::-webkit-scrollbar{width:4px}
    .modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
    .modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
    .modal-title{font-family:var(--font-display);font-size:20px;color:var(--white)}
    .modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0;line-height:1;transition:color .15s}
    .modal-close:hover{color:var(--white)}
    .form-row{margin-bottom:13px}
    .form-row label{display:block;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
    .form-row input,.form-row select,.form-row textarea{width:100%;background:rgba(255,255,255,0.05);border:0.5px solid var(--border2);border-radius:8px;padding:9px 13px;font-family:var(--font-body);font-size:13px;color:var(--white);outline:none;transition:border-color .15s}
    .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:rgba(200,16,46,0.45)}
    .form-row input::placeholder,.form-row textarea::placeholder{color:var(--muted2);font-weight:300}
    .form-row select option{background:var(--navy2)}
    .form-row textarea{resize:vertical;min-height:70px;line-height:1.5;font-weight:300}
    .form-row input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5);cursor:pointer}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
    .form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
    .section-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
    .section-divider{border:none;border-top:0.5px solid var(--border);margin:16px 0}

    /* UPDATES */
    .updates-log{max-height:200px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:1px}
    .updates-log::-webkit-scrollbar{width:3px}
    .updates-log::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
    .update-item{display:flex;gap:10px;align-items:flex-start;padding:9px 10px;border-radius:7px;background:rgba(255,255,255,0.03)}
    .update-item:hover{background:rgba(255,255,255,0.06)}
    .update-dot{width:6px;height:6px;border-radius:50%;background:var(--doing);margin-top:5px;flex-shrink:0}
    .update-text{font-size:13px;color:var(--white);flex:1;line-height:1.4;font-weight:300}
    .update-time{font-size:11px;color:var(--muted2);flex-shrink:0;margin-top:2px;white-space:nowrap}
    .update-delete{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;padding:0 2px;opacity:0;transition:opacity .15s,color .15s}
    .update-item:hover .update-delete{opacity:1}
    .update-delete:hover{color:#f0727f}
    .update-add{display:flex;gap:8px}
    .update-add input{flex:1;background:rgba(255,255,255,0.05);border:0.5px solid var(--border2);border-radius:8px;padding:9px 13px;font-family:var(--font-body);font-size:13px;color:var(--white);outline:none}
    .update-add input:focus{border-color:rgba(200,16,46,0.45)}
    .update-add input::placeholder{color:var(--muted2);font-weight:300}

    /* UPLOAD */
    .upload-zone{border:0.5px dashed var(--border2);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:8px;position:relative}
    .upload-zone:hover{border-color:rgba(200,16,46,0.45)}
    .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-zone-text{font-size:12px;color:var(--muted2);pointer-events:none}
    .upload-progress{font-size:12px;color:var(--doing);margin-bottom:8px;display:none}
    .link-preview-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
    .link-preview-item{border-radius:8px;overflow:hidden;border:0.5px solid var(--border);background:var(--navy3)}
    .link-preview-item img{width:88px;height:88px;object-fit:cover;display:block;cursor:pointer;transition:opacity .15s}
    .link-preview-item img:hover{opacity:.8}
    .link-label-preview{font-size:10px;color:var(--muted);padding:4px 7px;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .link-item{display:flex;gap:7px;margin-bottom:7px;align-items:center}
    .link-item input{flex:1;background:rgba(255,255,255,0.05);border:0.5px solid var(--border2);border-radius:8px;padding:8px 11px;font-family:var(--font-body);font-size:12px;color:var(--white);outline:none}
    .link-item input:focus{border-color:rgba(200,16,46,0.45)}
    .link-item input::placeholder{color:var(--muted2)}
    .link-remove{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:18px;padding:4px;transition:color .15s;flex-shrink:0}
    .link-remove:hover{color:#f0727f}
    .add-link-btn{font-size:12px;color:var(--muted);background:none;border:0.5px dashed var(--border2);border-radius:7px;padding:7px 14px;cursor:pointer;width:100%;font-family:var(--font-body);transition:border-color .15s,color .15s;margin-top:4px}
    .add-link-btn:hover{border-color:rgba(200,16,46,0.4);color:var(--white)}

    .lightbox{position:fixed;inset:0;background:rgba(5,12,20,0.95);display:flex;align-items:center;justify-content:center;z-index:300;cursor:pointer}
    .lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain}
    .modal-actions{display:flex;gap:8px;margin-top:18px;padding-top:16px;border-top:0.5px solid var(--border);flex-wrap:wrap}
    .team-member-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border)}
    .team-member-row:last-child{border-bottom:none}
    .team-member-name{font-size:14px;color:var(--white);display:flex;align-items:center;gap:10px}
    .avatar{width:28px;height:28px;border-radius:50%;background:rgba(200,16,46,0.2);border:0.5px solid rgba(200,16,46,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#f0727f;flex-shrink:0}
    .loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px}
    .spinner{width:16px;height:16px;border:1.5px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
    @media(max-width:768px){
      .topbar{padding:0 16px}.filters-bar{padding:12px 16px}.board-wrap{padding:14px 16px}
      .stats-pills{display:none}.form-grid,.form-grid3{grid-template-columns:1fr}
      .calendar-bar{flex-direction:column}.tabs-bar{padding:0 16px}
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Innovation Meeting Brasil</div>
    <div class="login-title">Tasks <em>2026</em></div>
    <div class="login-sub">Gestão de produção do evento</div>
    <div class="login-field">
      <input type="password" id="pw-input" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="topbar-brand"><div class="topbar-dot"></div>IMB <span>Tasks</span></div>
    <div class="topbar-right" id="topbar-actions"></div>
  </div>

  <div class="app-body">
    <!-- MAIN -->
    <div class="main-content">
      <!-- TABS -->
      <div class="tabs-bar">
        <button class="tab active" onclick="switchTab('imb')" id="tab-imb">IMB Tasks</button>
        <button class="tab" onclick="switchTab('outros')" id="tab-outros">Outros Eventos</button>
      </div>

      <!-- FILTERS -->
      <div class="filters-bar" id="filters-bar"></div>

      <!-- BOARD -->
      <div class="board-wrap">
        <div class="board" id="board">
          <div class="loading" style="grid-column:1/-1"><div class="spinner"></div> Carregando...</div>
        </div>
      </div>
    </div>

    <!-- CALENDAR SIDEBAR -->
    <div class="cal-sidebar">
      <div class="mini-cal">
        <div class="cal-header">
          <button class="cal-nav" onclick="calPrev()">‹</button>
          <span class="cal-month" id="cal-month-label"></span>
          <button class="cal-nav" onclick="calNext()">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div>
        <div class="cal-upcoming-title">Próximos prazos</div>
        <div class="cal-upcoming-list" id="cal-upcoming-list"></div>
      </div>
    </div>

  </div>
</div>

<div id="modal-slot"></div>

<script>
const SUPA_URL='https://zqzwwvcadjwpsligvser.supabase.co';

function hdrs(){return{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'}}
async function api(method,path,body){
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{method,headers:hdrs(),body:body?JSON.stringify(body):undefined});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):null;
}
async function uploadFile(file){
  const ext=file.name.split('.').pop();
  const name=Date.now()+'-'+Math.random().toString(36).slice(2)+'.'+ext;
  const res=await fetch(SUPA_URL+'/storage/v1/object/'+BUCKET+'/'+name,{
    method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':file.type,'x-upsert':'false'},body:file
  });
  if(!res.ok)throw new Error('Upload falhou: '+await res.text());
  return SUPA_URL+'/storage/v1/object/public/'+BUCKET+'/'+name;
}

function populateSelect(id,items){
  const sel=document.getElementById(id);if(!sel)return;
  const cur=sel.value;
  const first=sel.options[0].outerHTML;
  sel.innerHTML=first;
  items.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o)});
  if(cur)sel.value=cur;
}

/* ---- RENDER BOARD ---- */
function render(){
  const board=currentTab==='imb';
  const fa=board?(document.getElementById('f-area')?.value||''):'';
  const fe=!board?(document.getElementById('f-event')?.value||''):'';
  const fac=!board?(document.getElementById('f-action')?.value||''):'';
  const fp=document.getElementById('f-person')?.value||'';
  const fs=document.getElementById('f-sort')?.value||'created';

  let filtered=tasks.filter(t=>{
    const b=t.board||'imb';
    if(board&&b!=='imb')return false;
    if(!board&&b!=='outros')return false;
    if(fa&&t.area!==fa)return false;
    if(fe&&t.event_name!==fe)return false;
    if(fac&&t.action_name!==fac)return false;
    if(fp&&t.person!==fp)return false;
    return true;
  });
  if(fs==='date')filtered.sort((a,b)=>(a.due_date||'9999')>(b.due_date||'9999')?1:-1);
  else if(fs==='area')filtered.sort((a,b)=>(a.area||'').localeCompare(b.area||''));
  else if(fs==='today'){const td=new Date().toISOString().split('T')[0];filtered=filtered.filter(tk=>tk.due_date===td);}

  const stages=[
    {stage:'idea',label:'Ideias para validar',color:'var(--idea)'},
    {stage:'todo',label:'A fazer',color:'var(--todo)'},
    {stage:'doing',label:'Em curso',color:'var(--doing)'},
    {stage:'done',label:'Concluído',color:'var(--done)'},
  ];
  const counts={idea:0,todo:0,doing:0,done:0};
  filtered.forEach(t=>{if(t.stage in counts)counts[t.stage]++});
  const sp=document.getElementById('stats-pills');
  if(sp)sp.innerHTML=
    `<div class="stat-pill"><span class="dot" style="background:var(--idea)"></span>${counts.idea} ideias</div>`+
    `<div class="stat-pill"><span class="dot" style="background:var(--todo)"></span>${counts.todo} a fazer</div>`+
    `<div class="stat-pill"><span class="dot" style="background:var(--doing)"></span>${counts.doing} em curso</div>`+
    `<div class="stat-pill"><span class="dot" style="background:var(--done)"></span>${counts.done} concluídas</div>`;

  document.getElementById('board').innerHTML=stages.map(col=>{
    const items=filtered.filter(t=>t.stage===col.stage);
    return`<div class="col">
      <div class="col-head">
        <div class="col-head-left"><div class="col-indicator" style="background:${col.color}"></div><span class="col-label">${col.label}</span></div>
        <span class="col-count">${items.length}</span>
      </div>
      <div class="col-body">${items.length===0?'<div class="empty-col">Nenhuma tarefa</div>':items.map(cardHTML).join('')}</div>
    </div>`;
  }).join('');
}

/* ---- CARD HTML ---- */
function isImg(u){return/\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(u)}
function isPdf(u){return/\.pdf(\?.*)?$/i.test(u)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}`}
function fmtDT(ts){
  if(!ts)return'';const d=new Date(ts);
  return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function cardHTML(t){
  const links=taskLinks[t.id]||[];
  const updates=taskUpdates[t.id]||[];
  const last=updates.length?updates[updates.length-1]:null;
  const today=new Date().toISOString().split('T')[0];
  const overdue=t.due_date&&t.due_date<today&&t.stage!=='done';
  const isImb=(t.board||'imb')==='imb';

  const datesHTML=(t.start_date||t.due_date)?`<div class="card-dates">
    ${t.start_date?`<span class="card-date-item">Início ${fmtDate(t.start_date)}</span>`:''}
    ${t.start_date&&t.due_date?`<span class="card-date-sep">→</span>`:''}
    ${t.due_date?`<span class="card-date-item${overdue?' overdue':''}">Prazo ${fmtDate(t.due_date)}</span>`:''}
  </div>`:'';

  const metaBadges=isImb
    ?`<span class="badge badge-area">${esc(t.area)}</span>`
    :`${t.event_name?`<span class="badge badge-event">${esc(t.event_name)}</span>`:''}`+
     `${t.action_name?`<span class="badge badge-action">${esc(t.action_name)}</span>`:''}`;

  const linksHTML=links.length?`<div class="card-links-preview">${
    links.slice(0,4).map(l=>{
      if(isImg(l.url))return`<div class="link-thumb"><img src="${esc(l.url)}" loading="lazy"/></div>`;
      if(isPdf(l.url))return`<a href="${esc(l.url)}" target="_blank" onclick="event.stopPropagation()" class="pdf-pill">PDF ${esc(l.label||'')}</a>`;
      return`<span class="link-pill">${esc(l.label||'Link')}</span>`;
    }).join('')
  }${links.length>4?`<span class="link-pill">+${links.length-4}</span>`:''}</div>`:'';

  const updateHTML=last?`<div class="card-last-update">${esc(last.text)} <span style="font-size:10px;opacity:.7">${fmtDT(last.created_at)}</span></div>`:'';

  return`<div class="card ${t.stage}" onclick="openModal('${t.id}')">
    <div class="card-title">${esc(t.title)}</div>
    ${datesHTML}
    <div class="card-meta">
      ${metaBadges}
      ${t.person?`<span class="badge badge-person">${esc(t.person)}</span>`:''}
    </div>
    ${updateHTML}${linksHTML}
  </div>`;
}

/* ---- CALENDAR ---- */
function renderCalendar(){
  const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DOWS=['D','S','T','Q','Q','S','S'];
  document.getElementById('cal-month-label').textContent=MONTHS[calMonth]+' '+calYear;

  const taskDates={};
  tasks.forEach(t=>{
    if(t.due_date&&t.stage!=='done'){
      if(!taskDates[t.due_date])taskDates[t.due_date]=[];
      taskDates[t.due_date].push(t);
    }
  });

  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();

  let html=DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  for(let i=0;i<firstDay;i++){
    const day=daysInPrev-firstDay+i+1;
    html+=`<div class="cal-day other-month"><span>${day}</span></div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;
    const hasTasks=taskDates[dateStr]&&taskDates[dateStr].length>0;
    let cls='cal-day';
    if(isToday)cls+=' today';
    if(hasTasks)cls+=' has-task';
    html+=`<div class="${cls}" title="${hasTasks?taskDates[dateStr].map(t=>t.title).join(', '):''}">
      <span>${d}</span>${hasTasks?'<div class="cal-dot"></div>':''}
    </div>`;
  }

  const remaining=(7-((firstDay+daysInMonth)%7))%7;
  for(let i=1;i<=remaining;i++){
    html+=`<div class="cal-day other-month"><span>${i}</span></div>`;
  }

  document.getElementById('cal-grid').innerHTML=html;

  // Upcoming tasks
  const upcoming=tasks
    .filter(t=>t.due_date&&t.stage!=='done'&&t.due_date>=todayStr)
    .sort((a,b)=>a.due_date>b.due_date?1:-1)
    .slice(0,8);

  const stageColor={idea:'var(--idea)',todo:'var(--todo)',doing:'var(--doing)',done:'var(--done)'};
  const ul=document.getElementById('cal-upcoming-list');
  if(!upcoming.length){
    ul.innerHTML='<div class="no-upcoming">Nenhum prazo próximo</div>';
  }else{
    ul.innerHTML=upcoming.map(t=>`
      <div class="cal-task-chip" onclick="openModal('${t.id}');switchTab('${(t.board||'imb')==='imb'?'imb':'outros'}')">
        <span class="chip-dot" style="background:${stageColor[t.stage]||'var(--todo)'}"></span>
        <span class="chip-title">${esc(t.title)}</span>
        <span class="chip-date">${fmtDate(t.due_date)}</span>
      </div>`).join('');
  }
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCalendar()}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCalendar()}

/* ---- MODAL ---- */

  const eventOpts=EVENTS.map(a=>`<option value="${esc(a)}"${t.event_name===a?' selected':''}>${esc(a)}</option>`).join('');
  const actionOpts=ACTIONS.map(a=>`<option value="${esc(a)}"${t.action_name===a?' selected':''}>${esc(a)}</option>`).join('');

  const fieldSpecific=isImb

        <select id="m-area"><option value="">Selecione...</option>${areaOpts}</select>
      </div>`
    :`<div class="form-row"><label>Evento</label>
        <select id="m-event"><option value="">Selecione...</option>${eventOpts}</select>
      </div>
      <div class="form-row"><label>Ação</label>
        <select id="m-action"><option value="">Selecione...</option>${actionOpts}</select>
      </div>`;

  document.getElementById('modal-slot').innerHTML=`
    <div class="modal-bg" onclick="closeBg(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${id?'Editar tarefa':'Nova tarefa'}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="form-row"><label>Título</label>
          <input id="m-title" value="${esc(t.title||'')}" placeholder="O que precisa ser feito?"/>
        </div>
        <div class="form-grid">
          ${fieldSpecific}
          <div class="form-row"><label>Responsável</label>
            <select id="m-person"><option value="">Sem responsável</option>${teamOpts}</select>
          </div>
        </div>
        <div class="form-grid3">
          <div class="form-row"><label>Status</label>
            <select id="m-stage">
              <option value="idea"${(!t.stage||t.stage==='idea')?' selected':''}>Ideia para validar</option>
              <option value="todo"${t.stage==='todo'?' selected':''}>A fazer</option>
              <option value="doing"${t.stage==='doing'?' selected':''}>Em curso</option>
              <option value="done"${t.stage==='done'?' selected':''}>Concluído</option>
            </select>
          </div>
          <div class="form-row"><label>Data de início</label>
            <input type="date" id="m-start" value="${t.start_date||''}"/>
          </div>
          <div class="form-row"><label>Prazo final</label>
            <input type="date" id="m-date" value="${t.due_date||''}"/>
          </div>
        </div>
        <div class="form-row"><label>Descrição / como fazer</label>
          <textarea id="m-desc" placeholder="Detalhes, passos, contatos...">${esc(t.description||'')}</textarea>
        </div>
        ${id?`
        <hr class="section-divider"/>
        <span class="section-label">Atualizações do processo</span>
        <div class="updates-log" id="updates-log"></div>
        <div class="update-add">
          <input id="new-update" placeholder="Ex: Gi validou, aguardando proposta..." onkeydown="if(event.key==='Enter')addUpdate()"/>
          <button class="btn btn-red" onclick="addUpdate()">Registrar</button>
        </div>`:''}
        <hr class="section-divider"/>
        <span class="section-label">Fotos, PDFs e links</span>
        <div class="upload-zone">
          <input type="file" accept="image/*,application/pdf" multiple onchange="handleUpload(this)"/>
          <div class="upload-zone-text">Clique ou arraste fotos e PDFs aqui para fazer upload</div>
        </div>
        <div class="upload-progress" id="upload-progress"></div>
        <div id="links-preview-row" class="link-preview-row"></div>
        <div id="links-list"></div>
        <button class="add-link-btn" onclick="addLinkField()">+ Adicionar link manualmente</button>
        <div class="modal-actions">
          <button class="btn btn-red" onclick="saveTask()">Salvar</button>
          <button class="btn" onclick="closeModal()">Cancelar</button>
          ${id?`<button class="btn btn-delete" onclick="deleteTask('${id}')">Excluir</button>`:''}
        </div>

    </div>`;
  renderLinksList();
  if(id)renderUpdatesList();

async function handleUpload(input){
  const files=Array.from(input.files);if(!files.length)return;
  const prog=document.getElementById('upload-progress');prog.style.display='block';
  for(const file of files){
    try{prog.textContent='Enviando '+file.name+'...';const url=await uploadFile(file);pendingLinks.push({label:file.name.replace(/\.[^.]+$/,''),url});renderLinksList();}
    catch(e){alert('Erro no upload: '+e.message)}
  }
  prog.style.display='none';input.value='';
}

function renderLinksList(){
  const list=document.getElementById('links-list');if(!list)return;
  list.innerHTML=pendingLinks.map((l,i)=>`
    <div class="link-item">
      <input placeholder="Nome (ex: Referência palco)" value="${esc(l.label||'')}" oninput="pendingLinks[${i}].label=this.value" style="flex:0 0 148px;width:148px"/>
      <input placeholder="URL" value="${esc(l.url||'')}" oninput="pendingLinks[${i}].url=this.value;renderPreview()"/>
      <button class="link-remove" onclick="removeLink(${i})">×</button>
    </div>`).join('');
  renderPreview();
}

function renderPreview(){
  const p=document.getElementById('links-preview-row');if(!p)return;
  p.innerHTML=pendingLinks.map(l=>{
    if(l.url&&isImg(l.url))return`<div class="link-preview-item"><img src="${esc(l.url)}" loading="lazy" onclick="openLightbox('${esc(l.url)}')" onerror="this.parentElement.style.display='none'"/><div class="link-label-preview">${esc(l.label||'Foto')}</div></div>`;
    if(l.url&&isPdf(l.url))return`<a href="${esc(l.url)}" target="_blank" class="pdf-pill" style="margin:0 4px 4px 0">PDF ${esc(l.label||'')}</a>`;
    return'';
  }).join('');
}

function openLightbox(url){const lb=document.createElement('div');lb.className='lightbox';lb.onclick=()=>lb.remove();lb.innerHTML=`<img src="${esc(url)}"/>`;document.body.appendChild(lb)}
function addLinkField(){pendingLinks.push({label:'',url:''});renderLinksList()}
function removeLink(i){pendingLinks.splice(i,1);renderLinksList()}
function closeBg(e){if(e.target===e.currentTarget)closeModal()}
function closeModal(){document.getElementById('modal-slot').innerHTML='';editingId=null;pendingLinks=[]}

function renderUpdatesList(){
  const log=document.getElementById('updates-log');if(!log)return;
  const updates=taskUpdates[editingId]||[];
  if(!updates.length){log.innerHTML='<div style="font-size:12px;color:var(--muted2);padding:8px 0 4px">Nenhuma atualização ainda.</div>';return}
  log.innerHTML=[...updates].reverse().map(u=>`
    <div class="update-item">
      <div class="update-dot"></div>
      <div class="update-text">${esc(u.text)}</div>
      <div class="update-time">${fmtDT(u.created_at)}</div>
      <button class="update-delete" onclick="deleteUpdate('${u.id}')">×</button>
    </div>`).join('');
}

async function addUpdate(){
  const input=document.getElementById('new-update');
  const text=input.value.trim();if(!text||!editingId)return;
  const saved=await api('POST','task_updates',{task_id:editingId,text});
  const u=Array.isArray(saved)?saved[0]:saved;
  if(!taskUpdates[editingId])taskUpdates[editingId]=[];
  taskUpdates[editingId].push(u);input.value='';renderUpdatesList();render();renderCalendar();
}

async function deleteUpdate(uid){
  await api('DELETE','task_updates?id=eq.'+uid);
  if(taskUpdates[editingId])taskUpdates[editingId]=taskUpdates[editingId].filter(u=>u.id!==uid);
  renderUpdatesList();render();
}

async function saveTask(){
  const title=document.getElementById('m-title').value.trim();
  if(!title){alert('Coloca um título na tarefa.');return}
  const isImb=currentTab==='imb';
  const area=isImb?(document.getElementById('m-area')?.value||null):null;
  const event_name=!isImb?(document.getElementById('m-event')?.value||null):null;
  const action_name=!isImb?(document.getElementById('m-action')?.value||null):null;
  const payload={title,
    board:currentTab,
    area,event_name,action_name,
    person:document.getElementById('m-person').value||null,
    stage:document.getElementById('m-stage').value||'idea',
    start_date:document.getElementById('m-start').value||null,
    due_date:document.getElementById('m-date').value||null,
    description:document.getElementById('m-desc').value.trim()||null
  };
  try{
    let taskId=editingId;
    if(editingId){
      await api('PATCH','tasks?id=eq.'+editingId,payload);
      const idx=tasks.findIndex(x=>x.id===editingId);
      if(idx>=0)tasks[idx]={...tasks[idx],...payload};
    }else{
      const result=await api('POST','tasks',payload);
      const newTask=Array.isArray(result)?result[0]:result;
      taskId=newTask.id;tasks.unshift(newTask);
    }
    await api('DELETE','task_links?task_id=eq.'+taskId);
    taskLinks[taskId]=[];
    for(const l of pendingLinks.filter(l=>l.url.trim())){
      const saved=await api('POST','task_links',{task_id:taskId,label:l.label||null,url:l.url.trim()});
      taskLinks[taskId].push(Array.isArray(saved)?saved[0]:saved);
    }
    closeModal();render();renderCalendar();
  }catch(e){alert('Erro ao salvar: '+e.message)}
}

async function deleteTask(id){
  if(!confirm('Excluir essa tarefa?'))return;
  await api('DELETE','tasks?id=eq.'+id);
  tasks=tasks.filter(x=>x.id!==id);delete taskLinks[id];delete taskUpdates[id];
  closeModal();render();renderCalendar();
}
